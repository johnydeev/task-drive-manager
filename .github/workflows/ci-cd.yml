name: CI/CD

# Pipeline de 3 fases encadenadas: Test -> Build -> Deploy.
#   - En Pull Requests: corre solo Test (valida el PR, no despliega).
#   - En push a main:    Test -> Build (imagen a GHCR) -> Deploy (automatico al servidor).
#   - En tags v*:        Test -> Build (release versionada; NO despliega).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Fase 1 — Test: lint + typecheck + tests + build smoke.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build (smoke test)
        env:
          SERWIST_SUPPRESS_TURBOPACK_WARNING: "1"
          # Variables minimas para el build (no se conectan a APIs reales).
          GOOGLE_SHEET_ID: "fake-build-sheet"
          GOOGLE_CONSORCIOS_SHEET_ID: "fake-consorcios"
          GOOGLE_SERVICE_ACCOUNT_EMAIL: "build@example.com"
          GOOGLE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nfakekey\n-----END PRIVATE KEY-----\n"
          GOOGLE_DRIVE_ROOT_FOLDER_ID: "fake-drive"
          NEXTAUTH_URL: "http://localhost:4000"
          NEXTAUTH_SECRET: "ci-only-secret-not-real-just-for-build"
          GOOGLE_CLIENT_ID: "fake-client-id"
          GOOGLE_CLIENT_SECRET: "fake-client-secret"
        run: npm run build

  # ---------------------------------------------------------------------------
  # Fase 2 — Build: buildea la imagen Docker y la sube a GHCR.
  # Solo en push (main o tags). No corre en PRs. Requiere que Test pase.
  # ---------------------------------------------------------------------------
  build:
    name: Build & push image
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/johnydeev/task-drive-manager
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Fase 3 — Deploy: actualiza los contenedores en el servidor.
  # Solo desde main (no desde tags). Requiere que Build pase.
  # Corre en un self-hosted runner instalado en el servidor (detras de Cloudflare
  # Tunnel, sin SSH expuesto). Configurar la variable de repo DEPLOY_DIR con la ruta
  # donde viven docker-compose.yml y .env en el servidor.
  #
  # Guarda: mientras la variable DEPLOY_DIR NO exista, esta fase se saltea (Test y
  # Build corren igual). Asi se puede pushear a main sin tener el runner todavia, sin
  # que el job quede colgado esperando un runner. Al setear DEPLOY_DIR se activa sola.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_DIR != ''
    runs-on: [self-hosted]
    # Los pasos usan PowerShell (no bash): en un runner self-hosted de Windows,
    # "shell: bash" resuelve al bash de WSL (sin distro) y falla. PowerShell 5.1
    # siempre está presente y habla nativo con Docker Desktop.
    #
    # Credenciales de GHCR: NO usamos el credential helper de Docker Desktop
    # ("credsStore": "desktop" en ~/.docker/config.json). Ese helper necesita la sesión
    # interactiva de Windows del usuario que abrió Docker Desktop; cuando el runner corre
    # como servicio (sesión 0) o esa sesión se cierra (reboot / logoff / RDP), CUALQUIER
    # operación de credenciales falla con "A specified logon session does not exist"
    # —tanto leer (pull) como guardar (docker login)—.
    #
    # Por eso tampoco corremos "docker login" (invoca el helper para GUARDAR y falla igual).
    # En su lugar escribimos nosotros el config.json en un DOCKER_CONFIG aislado, con el
    # token en base64 bajo "auths". Sin clave "credsStore", Docker usa ese auth en texto
    # plano directamente y nunca llama al helper. Sobrevive a reinicios/logoffs.
    steps:
      - name: Escribir credenciales de GHCR (config.json aislado, sin credsStore)
        shell: powershell
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $cfgDir = Join-Path $env:RUNNER_TEMP 'docker-cfg-tdm'
          New-Item -ItemType Directory -Force -Path $cfgDir | Out-Null
          $pair = '{0}:{1}' -f $env:GHCR_USER, $env:GHCR_TOKEN
          $b64  = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          $config = @{ auths = @{ 'ghcr.io' = @{ auth = $b64 } } } | ConvertTo-Json -Depth 5
          # ASCII sin BOM: un BOM al inicio rompe el parseo de config.json de Docker.
          [System.IO.File]::WriteAllText((Join-Path $cfgDir 'config.json'), $config, (New-Object System.Text.ASCIIEncoding))
          "DOCKER_CONFIG=$cfgDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ascii

      - name: Pull y reiniciar contenedores
        shell: powershell
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DEPLOY_DIR)) {
            Write-Error "Falta la variable de repo DEPLOY_DIR (ruta del docker-compose.yml + .env en el servidor)."
            exit 1
          }
          Set-Location -LiteralPath $env:DEPLOY_DIR
          docker compose pull
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          docker compose up -d
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          docker compose ps
