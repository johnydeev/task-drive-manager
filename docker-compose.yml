name: task-drive-manager

services:
  web:
    image: ghcr.io/johnydeev/task-drive-manager:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "4000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # Cloudflare Tunnel para exponer la app vía HTTPS sin abrir puertos en el router.
  tunnel:
    image: cloudflare/cloudflared:2025.2.0
    restart: unless-stopped
    command: tunnel --no-autoupdate run --url http://web:3000
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
